name: Semantic Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: macos-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Run unit tests
        run: make test-unit-py${{ matrix.python-version }}

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write  # for PyPI Trusted Publishing (OIDC)
    outputs:
      released: ${{ steps.semrel.outputs.new_release_published }}
      version: ${{ steps.semrel.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm install

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Run semantic-release
        id: semrel
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify built distributions
        if: steps.semrel.outputs.new_release_published == 'true'
        run: twine check dist/*

      - name: Publish to PyPI (Trusted Publishing)
        if: steps.semrel.outputs.new_release_published == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Build Desktop Extension (.mcpb)
        if: steps.semrel.outputs.new_release_published == 'true'
        run: |
          cp letterhead_pdf/resources/icon.png dxt/icon.png
          cd dxt && npx --yes @anthropic-ai/mcpb pack

      - name: Attach .mcpb to GitHub release
        if: steps.semrel.outputs.new_release_published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.semrel.outputs.new_release_version }}"
          MCPB_FILE="dxt/mac-letterhead-${VERSION}.mcpb"
          # mcpb pack emits dxt/dxt.mcpb on some versions, mac-letterhead-<v>.mcpb on others
          if [ ! -f "$MCPB_FILE" ] && [ -f dxt/dxt.mcpb ]; then
            mv dxt/dxt.mcpb "$MCPB_FILE"
          fi
          gh release upload "v${VERSION}" "$MCPB_FILE" --clobber

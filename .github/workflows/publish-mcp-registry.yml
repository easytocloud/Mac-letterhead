name: Publish to MCP Registry

on:
  workflow_run:
    workflows: ["Semantic Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.15.6)'
        required: true
        type: string

jobs:
  publish-mcp:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Extract version from latest release
      id: version
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ inputs.version }}"
        else
          VERSION=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' | sed 's/^v//')
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Publishing version: $VERSION"

    - name: Build Desktop Extension (.mcpb)
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        echo "Building Desktop Extension for version $VERSION..."
        make build-dxt
        echo "MCPB_FILE=dxt/mac-letterhead-${VERSION}.mcpb" >> $GITHUB_ENV
        echo "✅ Built dxt/mac-letterhead-${VERSION}.mcpb"

    - name: Upload .mcpb to GitHub release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        gh release upload "v${VERSION}" "${MCPB_FILE}" --clobber
        echo "✅ Uploaded ${MCPB_FILE} to release v${VERSION}"

    - name: Install mcp-publisher
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Installing mcp-publisher..."
        RELEASE_URL="https://api.github.com/repos/modelcontextprotocol/registry/releases/latest"
        DOWNLOAD_URL=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$RELEASE_URL" \
          | grep -m1 "browser_download_url.*mcp-publisher.*linux_amd64\.tar\.gz\"" \
          | cut -d '"' -f 4)

        if [ -z "$DOWNLOAD_URL" ]; then
          echo "Failed to find mcp-publisher download URL. API response:"
          curl -s -H "Authorization: token $GITHUB_TOKEN" "$RELEASE_URL" | grep browser_download_url
          exit 1
        fi

        echo "Downloading from: $DOWNLOAD_URL"
        curl -L -o mcp-publisher.tar.gz "$DOWNLOAD_URL"
        tar -xzf mcp-publisher.tar.gz
        chmod +x mcp-publisher
        ./mcp-publisher --version

    - name: Login to MCP Registry
      env:
        MCP_PUBLISHER_TOKEN: ${{ secrets.MCP_PUBLISHER_TOKEN }}
      run: |
        echo "Logging in to MCP Registry via GitHub..."
        ./mcp-publisher login github --token "$MCP_PUBLISHER_TOKEN"

    - name: Validate server.json
      run: |
        echo "Validating server.json..."
        ./mcp-publisher publish --dry-run

    - name: Publish to MCP Registry
      run: |
        echo "Publishing to MCP Registry..."
        PUBLISH_OUTPUT=$(./mcp-publisher publish 2>&1) && {
          echo "$PUBLISH_OUTPUT"
          echo "✅ Successfully published to MCP Registry"
        } || {
          echo "$PUBLISH_OUTPUT"
          if echo "$PUBLISH_OUTPUT" | grep -q "cannot publish duplicate version"; then
            echo "⚠️ Version already registered in MCP Registry — OK"
          else
            exit 1
          fi
        }

    - name: Create summary
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        cat >> $GITHUB_STEP_SUMMARY <<EOF
        ## MCP Registry Publication

        Successfully published Mac-letterhead MCP server to the official registry.

        **Version**: $VERSION
        **Namespace**: io.github.easytocloud/mac-letterhead
        **Registry URL**: https://registry.modelcontextprotocol.io/servers/io.github.easytocloud/mac-letterhead
        **Release**: https://github.com/easytocloud/Mac-letterhead/releases/tag/v${VERSION}
        EOF
